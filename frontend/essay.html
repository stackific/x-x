{{#> layout title="Essay" page="essay" active="home" description="Stax — essay."}}
  <article class="container py-l" id="essay-article">
    <img
      id="essay-cover"
      class="responsive round large"
      src="/default-cover.jpg"
      alt=""
      loading="eager"
    />
    <h3 class="mt-m" id="essay-title">Loading…</h3>
    <div class="mt-s small-text essay-meta" id="essay-meta"></div>
    <hr class="mt-m" />
    <div class="mt-l essay-content" id="essay-content"></div>
  </article>

  <template id="tpl-chip-parent">
    <a class="chip small round no-elevate">
      <i>folder</i>
      <span data-slot="name"></span>
    </a>
  </template>

  <template id="tpl-chip-system">
    <a class="chip small round fill">
      <i>hub</i>
      <span data-slot="name"></span>
    </a>
  </template>

  <template id="tpl-chip-minibook">
    <a class="chip small round tertiary-container no-elevate">
      <i>menu_book</i>
      <span data-slot="name"></span>
    </a>
  </template>

  <template id="tpl-date">
    <span data-slot="date"></span>
  </template>
{{/layout}}
