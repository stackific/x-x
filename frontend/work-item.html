{{#> layout title="Work item" page="work-item" active="work-items" description="Stax — work-item detail."}}
  <section class="container py-l">
    <a href="/work-items" class="link small-text mb-m">&larr; All work items</a>
    <div class="row middle-align mb-m">
      <i class="large mr-s" id="work-item-icon" aria-hidden="true">flag</i>
      <h4 id="work-item-title" class="max no-margin">Loading…</h4>
    </div>
    <div class="row middle-align mb-m wrap">
      <span class="chip small no-elevate mr-t" id="work-item-status" hidden></span>
      <span class="small-text" id="work-item-created"></span>
      <div class="max"></div>
      <div class="row wrap" id="work-item-systems"></div>
    </div>

    <div id="work-item-superseded-by-row" class="row left-align middle-align wrap small-text mb-m" hidden>
      <span class="mr-s">Superseded by:</span>
      <div class="row wrap" id="work-item-superseded-by"></div>
    </div>

    <article id="work-item-body" class="work-item-body padding round surface-variant px-l py-l" aria-live="polite">
      <p class="small-text">Loading work-item body…</p>
    </article>
  </section>

  <template id="tpl-system-link">
    <a class="chip small no-elevate ml-t border primary-border primary-text"></a>
  </template>

  <template id="tpl-work-item-link">
    <a class="chip small no-elevate mr-t border"></a>
  </template>

  <template id="tpl-error">
    <p class="small-text bold" data-slot="error"></p>
  </template>
{{/layout}}
