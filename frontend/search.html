{{#> layout title="Search" page="search" active="search" description="Stax — search across scopes and systems."}}
  <section class="container py-l">
    <h4 class="mb-m">Search</h4>
    <div class="field label prefix border round mb-l">
      <i>search</i>
      <input type="search" id="search-input" autocomplete="off" autofocus />
      <label>Search by title, system, or keyword</label>
    </div>

    <p id="search-hint" class="center-align padding small-text">
      Type to search across scopes and systems.
    </p>

    <section id="search-scopes-section" class="mb-l" hidden>
      <h6 class="small mb-s">Scopes</h6>
      <div id="search-scopes" aria-live="polite"></div>
      <p id="search-scopes-empty" class="small-text" hidden>No matching scopes.</p>
    </section>

    <section id="search-systems-section" class="mb-l" hidden>
      <h6 class="small mb-s">Systems</h6>
      <div id="search-systems" aria-live="polite"></div>
      <p id="search-systems-empty" class="small-text" hidden>No matching systems.</p>
    </section>

    <p id="search-empty-all" class="center-align padding small-text" hidden>
      No matches for that query.
    </p>
  </section>

  <template id="tpl-scope">
    <a class="row padding round surface-variant wave no-elevate mb-s middle-align">
      <i class="large" aria-hidden="true">flag</i>
      <h6 class="small no-margin max ml-s" data-slot="title"></h6>
      <div class="row wrap middle-align" data-slot="systems"></div>
      <div class="row middle-align small-text ml-s">
        <span data-slot="created"></span>
        <span class="mx-s">·</span>
        <span data-slot="status"></span>
      </div>
    </a>
  </template>

  <template id="tpl-system">
    <a class="row padding round surface-variant wave no-elevate mb-s">
      <i class="large" aria-hidden="true">hub</i>
      <div class="max ml-s middle-align">
        <h6 data-slot="name"></h6>
        <p class="small-text mt-t" data-slot="brief"></p>
      </div>
      <span class="small-text" data-slot="count"></span>
    </a>
  </template>

  <template id="tpl-system-chip">
    <a class="chip small no-elevate ml-t border primary-border primary-text" data-stop></a>
  </template>

  <template id="tpl-error">
    <p class="small-text bold" data-slot="error"></p>
  </template>
{{/layout}}
