{{#> layout title="Home" page="home" active="home" description="Stax — live data from the Go backend."}}
  <section class="container py-l">
    <h4 class="mb-m">Home</h4>
    <p class="mb-l">Live response from the Go backend at <code>/api/hello</code>.</p>

    <div id="hello" class="padding round surface-variant" aria-live="polite">
      <p class="small-text">Loading…</p>
    </div>
  </section>

  <template id="tpl-hello">
    <div>
      <h6 class="mb-s" data-slot="message"></h6>
      <pre class="small-text" data-slot="raw"></pre>
    </div>
  </template>

  <template id="tpl-error">
    <p class="small-text bold" data-slot="error"></p>
  </template>
{{/layout}}
