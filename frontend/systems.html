{{#> layout title="Systems" page="systems" active="systems" description="Stax — registered systems."}}
  <section class="container py-l">
    <h4 class="mb-m">Systems</h4>

    <div id="systems-list" aria-live="polite">
      <p class="small-text">Loading…</p>
    </div>
  </section>

  <template id="tpl-system">
    <a class="row padding round surface-variant wave no-elevate mb-s">
      <i class="large" aria-hidden="true">hub</i>
      <div class="max ml-s">
        <h6 data-slot="name"></h6>
        <p class="small-text mt-t" data-slot="brief"></p>
      </div>
      <span class="small-text" data-slot="count"></span>
    </a>
  </template>

  <template id="tpl-empty">
    <p class="small-text">No systems found.</p>
  </template>

  <template id="tpl-error">
    <p class="small-text bold" data-slot="error"></p>
  </template>
{{/layout}}
