policies:
  - type: commit
    spec:
      header:
        length: 72
        imperative: true
        case: lower
      body:
        required: false
      conventional:
        types:
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert
        # Conform compiles each entry as a regexp; "*" panics because it's not
        # a valid pattern. Use ".*" to match any scope (the original intent).
        scopes: [".*"]
