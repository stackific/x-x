version: "3"

# Single entry point for everything. Run `task --list` to see the menu.

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  # ---------- Setup ----------

  setup:
    desc: Install git hooks and frontend dependencies
    cmds:
      - lefthook install
      - test ! -d frontend || (cd frontend && npm install)

  # ---------- Quality (delegated to lefthook) ----------

  prepush:
    desc: Run every pre-push hook against all files
    cmds:
      - lefthook run pre-push --all-files

  lint:
    desc: Run golangci-lint with auto-fix
    # server.go uses `//go:embed all:frontend/dist`; golangci-lint typechecks
    # via go/packages, which processes embed directives at load time. If
    # `frontend/dist/` is missing the lint run fails with "pattern
    # all:frontend/dist: no matching files" before any linter executes.
    deps:
      - frontend:build
    cmds:
      - golangci-lint run --fix ./...

  lint:check:
    desc: Run golangci-lint without auto-fix (read-only; used by pre-push)
    # Same embed-dep gotcha as `lint`; see comment there.
    deps:
      - frontend:build
    cmds:
      - golangci-lint run ./...

  vet:
    desc: Run `go vet` across all packages
    # `go vet` loads packages via go/packages and processes
    # `//go:embed all:frontend/dist`; without dist the vet pass fails to
    # build before any check fires.
    deps:
      - frontend:build
    cmds:
      - go vet ./...

  govulncheck:
    desc: Run govulncheck against the module
    # govulncheck compiles the module to walk its call graph; the embed
    # gate applies just like `go build`.
    deps:
      - frontend:build
    cmds:
      - govulncheck ./...

  # ---------- Dev runtime ----------

  run:
    desc: Run the CLI with the latest embedded frontend (forwards extra args after `--`)
    # Rebuild the frontend first so the //go:embed directive picks up the
    # current `frontend/dist/`. Without this dep, `task run` would happily
    # ship the last-built bundle even if the user just edited
    # `frontend/src/...` — a "why am I seeing old UI?" footgun.
    deps:
      - frontend:build
    cmds:
      - go run . {{.CLI_ARGS}}

  build:
    desc: Cross-compile binaries for macOS, Linux, and Windows (amd64 + arm64) into ./bin
    # Build the frontend first so every shipped binary embeds the latest
    # `frontend/dist/`. The Go build's //go:embed directive is baked at
    # compile time; without this dep, cross-compiled artifacts would
    # ship the last-built (possibly stale) Vite output.
    deps:
      - frontend:build
    cmds:
      - mkdir -p bin
      - |
        # Matches the platform matrix in .github/workflows/release.yml so
        # local builds and release artifacts stay byte-comparable.
        # CGO_ENABLED=0 keeps the binaries statically linked; -s -w strips
        # the symbol table and DWARF info to shrink them.
        for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
          GOOS="${platform%/*}"
          GOARCH="${platform#*/}"
          output="bin/stax-${GOOS}-${GOARCH}"
          [ "$GOOS" = "windows" ] && output="${output}.exe"
          echo "Building ${output}..."
          CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "-s -w" -o "$output" .
        done

  test:
    desc: Run the full test suite (Go unit tests + end-to-end CLI tests)
    # `go test ./...` compiles every package, including the root which
    # carries `//go:embed all:frontend/dist`; without dist the test
    # binary fails to build before any test runs.
    deps:
      - frontend:build
    cmds:
      - go test -race -count=1 ./...
      - ./scripts/e2e_test.sh

  test:unit:
    desc: Run only the Go unit tests
    # See `test` for the embed-dep rationale.
    deps:
      - frontend:build
    cmds:
      - go test -race -count=1 ./...

  test:e2e:
    desc: Run only the end-to-end CLI tests (builds stax, drives every command)
    # NOTE: e2e_test.sh self-bootstraps `frontend/dist` when missing, so a
    # `task frontend:build` dep would only duplicate work. Keep this task
    # dep-free as the script's own bootstrap is the source of truth.
    cmds:
      - ./scripts/e2e_test.sh

  # ---------- Frontend ----------

  frontend:dev:
    desc: Run the Vite dev server
    dir: frontend
    cmds:
      - npm run dev

  frontend:build:
    desc: Build the frontend for production (single bundle.js + bundle.css)
    dir: frontend
    cmds:
      - npm run build

  frontend:check:
    desc: Frontend typecheck + Biome lint + Knip dead-code
    dir: frontend
    cmds:
      - npm run check

  frontend:lint:fix:
    desc: Run Biome lint with auto-fix on the frontend
    dir: frontend
    cmds:
      - npm run lint:fix

  frontend:fmt:
    desc: Format frontend code with Biome
    dir: frontend
    cmds:
      - npm run fmt
