name: manual / kilo code <- llm judge (user scope)

# Manually-triggered experiment from the agent-eval lineage. User-scope
# variant of manual-kilo-judge.yml — same agent (Kilo Code CLI), same
# routing (per-workspace kilo.json pointing at DeepSeek's openai-compat
# endpoint), same scenarios, but X_X_INSTALL_SCOPE=user so `x-x init`
# installs skills into ~/.kilo/skills/ rather than the per-workspace
# .kilo/skills/. Exercises the user-scope branch of `x-x init` against
# the Kilo backend.
#
# See docs/internal/adding-agent-eval-backend.md for the recipe and
# manual-kilo-judge.yml for the project-scope counterpart.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      # Identical to manual-kilo-judge.yml EXCEPT for X_X_INSTALL_SCOPE.
      # The pytest fixture (skills-evals/tests/conftest.py) reads
      # X_X_INSTALL_SCOPE and passes it to `x-x init --scope <value>`.
      X_X_INSTALL_SCOPE: user

      # Tell the conftest which agent it's bootstrapping the workspace for.
      # The fixture writes a per-workspace kilo.json and routes `x-x init`
      # with `--agents kilo`.
      X_X_AGENT_UNDER_TEST: kilo

      # DeepSeek API key powers both the judge LLM (direct DeepSeek call)
      # and the kilo agent (DeepSeek via openai-compatible). The kilo
      # workspace config substitutes {env:DEEPSEEK_API_KEY} at agent
      # startup; the conftest also mirrors this into KILO_API_KEY as a
      # belt-and-suspenders for any code path that bypasses the config.
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      # Kilo overrides documented at
      # https://kilo.ai/docs/code-with-ai/platforms/cli — these match
      # KILO_ENV_DEFAULTS in skills-evals/tests/conftest.py.
      KILO_PROVIDER: openai-compatible
      KILOCODE_MODEL: openai-compatible/deepseek-v4-pro

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install x-x to PATH
        run: |
          go install .
          x-x --version

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: install kilo code
        run: |
          npm install -g @kilocode/cli@latest
          kilo --version

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      - name: run pytest (kilo suite, user scope)
        working-directory: skills-evals
        run: uv run pytest tests/test_kilo_stream_smoke.py tests/test_kilo_todo.py tests/test_kilo_plan_extends.py tests/test_kilo_reminders_supersedes_todo.py

      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
