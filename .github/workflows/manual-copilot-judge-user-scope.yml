name: manual / github copilot cli <- llm judge (user scope)

# Manually-triggered experiment from the agent-eval lineage. Mirrors
# manual-copilot-judge.yml but installs skills at user scope
# (~/.copilot/skills/) rather than project scope (`.agents/skills/`).
# This exercises the agentTargets userSkillsRel branch that diverges
# from skillsRel for Copilot CLI — verifying the user-scope path on a
# real Linux runner. See docs/internal/adding-agent-eval-backend.md for
# the agent-eval recipe and docs/internal/manually-triggered-workflows.md
# for the workflow conventions.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    # Same envelope as the project-scope variant: 60-minute cap leaves
    # headroom for DeepSeek latency across the smoke + three scenarios
    # without rewarding a stuck agent.
    timeout-minutes: 60

    env:
      # Identical to manual-copilot-judge.yml EXCEPT for X_X_INSTALL_SCOPE.
      # The pytest fixture (skills-evals/tests/conftest.py) reads this
      # and passes it to `x-x init --scope <value>`, so the same test
      # suite drives both project-scope and user-scope installs.
      X_X_INSTALL_SCOPE: user

      # Copilot CLI BYOK routing for DeepSeek's Anthropic-compatible endpoint.
      # Provider type MUST be `anthropic` (not `openai`) — DeepSeek requires
      # reasoning_content echo-back on subsequent requests, which Copilot CLI's
      # OpenAI integration does not support.
      COPILOT_PROVIDER_TYPE: anthropic
      COPILOT_PROVIDER_BASE_URL: https://api.deepseek.com/anthropic
      COPILOT_PROVIDER_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      COPILOT_MODEL: deepseek-v4-pro
      COPILOT_PROVIDER_MAX_PROMPT_TOKENS: '840000'
      COPILOT_PROVIDER_MAX_OUTPUT_TOKENS: '128000'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install x-x to PATH
        run: |
          go install .
          x-x --version

      # GitHub Copilot CLI requires Node 22+.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      # @latest is fragile when the wire surface evolves but acceptable
      # for a manually-triggered experiment. Bump intentionally after
      # verifying the smoke test still passes against the new version.
      - name: install github copilot cli
        run: |
          npm install -g @github/copilot@latest
          copilot --version

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest tests/test_copilot_stream_smoke.py tests/test_copilot_todo.py tests/test_copilot_plan_extends.py tests/test_copilot_reminders_supersedes_todo.py

      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
