name: skills eval / github copilot cli (user scope)

# Identical to skills-eval-copilot.yml EXCEPT for STAX_INSTALL_SCOPE.
# Installs skills at user scope (~/.agents/skills/) rather than project
# scope (`.agents/skills/`). `~/.agents/skills/` is on Copilot CLI's
# official user-scope list, and reusing the cross-agent open spec path
# here lets the bundled SKILL.md content (which only resolves
# `.claude/skills/` and `.agents/skills/`) discover the shared docs
# correctly.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      STAX_AGENT_KEY: copilot
      STAX_INSTALL_SCOPE: user

      COPILOT_PROVIDER_TYPE: anthropic
      COPILOT_PROVIDER_BASE_URL: https://api.deepseek.com/anthropic
      COPILOT_PROVIDER_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      COPILOT_MODEL: deepseek-v4-pro
      COPILOT_PROVIDER_MAX_PROMPT_TOKENS: '840000'
      COPILOT_PROVIDER_MAX_OUTPUT_TOKENS: '128000'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: install frontend deps
        working-directory: frontend
        run: npm ci

      - name: build frontend (produces frontend/dist for the Go embed)
        working-directory: frontend
        run: npm run build

      - name: install stax to PATH
        run: |
          go install .
          stax --version

      - name: install github copilot cli
        run: |
          npm install -g @github/copilot@latest
          copilot --version

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest

      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
