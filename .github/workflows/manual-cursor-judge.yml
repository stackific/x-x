name: manual / cursor <- llm judge

# Manually-triggered experiment in the agent-eval lineage. Targets the
# Cursor CLI (`cursor-agent`). Drivers, judges, and test files live
# in a follow-up PR — this workflow ships the scaffold (CLI install,
# env routing, pytest invocation) so the eval suite can plug in once
# the cursor driver lands.
#
# Non-interactive entry: `cursor-agent -m <model> -p "<prompt>"` runs
# a single prompt to completion. CURSOR_API_KEY is the auth secret;
# routing through DeepSeek will need a custom model/base-URL config
# that the driver wires up at spawn time.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      X_X_AGENT_KEY: cursor

      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install x-x to PATH
        run: |
          go install .
          x-x --version

      # Cursor CLI ships via a shell installer; the binary is
      # `cursor-agent`. The installer drops it under ~/.cursor/bin
      # by default — exporting that on PATH for downstream steps.
      - name: install cursor cli
        run: |
          curl -fsSL https://cursor.com/install | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cursor/bin:$PATH"
          cursor-agent --version

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest

      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
