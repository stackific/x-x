name: skills eval / cline (user scope)

# Identical to skills-eval-cline.yml EXCEPT for STAX_INSTALL_SCOPE.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      STAX_AGENT_KEY: cline
      STAX_INSTALL_SCOPE: user

      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install stax to PATH
        run: |
          go install .
          stax --version

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: install cline cli
        run: |
          npm install -g cline@latest
          cline --version

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest tests/test_cline_stream_smoke.py tests/test_cline_todo.py tests/test_cline_plan_extends.py tests/test_cline_reminders_supersedes_todo.py

      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
