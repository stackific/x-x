name: manual / antigravity <- llm judge

# Manually-triggered experiment in the agent-eval lineage. Targets
# Google's Antigravity CLI (`agy`, the Gemini CLI successor announced
# at I/O 2026). Drivers, judges, and test files live in a follow-up
# PR — this workflow ships the scaffold so the eval suite can plug in
# once the antigravity driver lands.
#
# Install command and authentication path are still being verified —
# the install step below uses the npm package name as a placeholder;
# bump or replace once the official install one-liner is pinned.
# Antigravity authenticates against a Google account or GCP project
# (no DeepSeek BYOK route documented yet); the driver will need to
# route around that or sit out of the DeepSeek-uniform eval matrix.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      X_X_AGENT_KEY: antigravity

      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install x-x to PATH
        run: |
          go install .
          x-x --version

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Placeholder install — replace with the official Antigravity CLI
      # install command once it stabilizes. See
      # developers.googleblog.com/an-important-update-transitioning-gemini-cli-to-antigravity-cli/
      - name: install antigravity cli
        run: |
          npm install -g @google/antigravity-cli@latest || true
          agy --version || true

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest

      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
