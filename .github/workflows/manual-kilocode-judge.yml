name: manual / kilocode <- llm judge

# Manually-triggered experiment in the agent-eval lineage. Mirrors
# manual-opencode-judge.yml but targets the Kilo Code CLI (`kilo`,
# from @kilocode/cli on npm). Drivers, judges, and test files live in
# a follow-up PR — this workflow ships the scaffold (CLI install,
# env routing, pytest invocation) so the eval suite can plug in once
# the kilocode driver lands.
#
# Non-interactive entry: `kilo run --auto "<prompt>"` runs autonomously
# without permission prompts. The driver will wrap that — the same
# pattern as the other agents.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      # X_X_AGENT_KEY tells the skills-evals conftest which backend's
      # tests to collect, which binary to require on PATH, and which
      # `--agents <key>` value to pass to `x-x init`. Default is
      # "claude"; this workflow runs the Kilo Code set (driver TBD).
      X_X_AGENT_KEY: kilocode

      # Single shared secret for the judge LLM and (eventually) the
      # kilocode driver. Provider routing flags will be added when the
      # driver lands.
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install x-x to PATH
        run: |
          go install .
          x-x --version

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Kilo Code CLI ships as @kilocode/cli on npm; the binary is
      # `kilo`. Pin to @latest until we have a known-good version;
      # bump intentionally if the smoke test starts failing on a
      # fresh release.
      - name: install kilocode cli
        run: |
          npm install -g @kilocode/cli@latest
          kilo --version

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest

      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
