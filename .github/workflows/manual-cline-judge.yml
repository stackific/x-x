name: manual / cline <- llm judge

# Manually-triggered experiment in the agent-eval lineage. Targets the
# Cline CLI (`cline`, from the `cline` npm package). Drivers, judges,
# and test files live in a follow-up PR — this workflow ships the
# scaffold (CLI install, env routing, pytest invocation) so the eval
# suite can plug in once the cline driver lands.
#
# Non-interactive entry: `cline -y "<prompt>"` runs in YOLO mode (no
# permission prompts), with optional `--json` for NDJSON event stream.
# Cline's provider routing supports Anthropic / OpenAI / Google / others;
# DeepSeek wiring follows the same BYOK pattern as the other agents.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      X_X_AGENT_KEY: cline

      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install x-x to PATH
        run: |
          go install .
          x-x --version

      # Cline CLI requires Node 22+.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: install cline cli
        run: |
          npm install -g cline@latest
          cline --version

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest

      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
