name: skills eval / cline

# Manually-triggered experiment from the agent-eval lineage. Targets Cline
# CLI via DeepSeek routed through cline's first-class `deepseek` provider.
# The loop:
#
#   1. Install Cline CLI (npm `cline`); install stax to PATH.
#   2. Sync the uv-managed skills-evals project.
#   3. Run `uv run pytest`. conftest filters to `test_cline_*` via
#      STAX_AGENT_KEY=cline. The tests:
#        a. Spawn `cline --yolo --json -c <ws> -t <s>` per skill
#           invocation (single-shot subprocess; YOLO mode auto-approves
#           every tool call). The cline driver inlines the SKILL.md off
#           `<ws>/.cline/skills/<skill>/SKILL.md` into the prompt
#           because cline does not resolve slash commands in headless
#           mode. `stax init --agents cline` (first-class entry in
#           agentTargets) writes the SKILL.md tree exactly where the
#           driver reads it.
#        b. Provider routing comes from cline's on-disk auth state
#           (`cline auth --provider deepseek --apikey <key> --modelid
#           deepseek-v4-pro` in the workspace fixture; sandboxed $HOME
#           means the auth state is per-test).
#        c. Score the work item and produced artifacts with the same DeepEval
#           `GEval` metrics used by the Claude eval.
#   4. Upload the pytest tmp directory (transcripts + workspace) on
#      failure so the run can be inspected offline.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    # 60-minute cap leaves headroom for DeepSeek latency across the
    # smoke + scenario tests without rewarding a stuck agent.
    timeout-minutes: 60

    env:
      # STAX_AGENT_KEY tells the skills-evals conftest which backend's
      # tests to collect (`test_cline_*`), which binary to require on
      # PATH (`cline`), and which `--agents <key>` value to pass to
      # `stax init` (`cline` — first-class entry in agentTargets, lands
      # skills at `.cline/skills/` per docs.cline.bot).
      STAX_AGENT_KEY: cline

      # Cline reads its DeepSeek routing from its on-disk auth state,
      # not from process env. DEEPSEEK_API_KEY is what the workspace
      # fixture feeds to `cline auth --apikey` (and what the judge LLM
      # reads directly), so the one secret routes both sides.
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # server.go embeds frontend/dist via //go:embed all:frontend/dist
      # (gitignored). Build it before `go install` or the embed pattern
      # resolves to an empty dir and the compile fails at server.go.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: install frontend deps
        working-directory: frontend
        run: npm ci

      - name: build frontend (produces frontend/dist for the Go embed)
        working-directory: frontend
        run: npm run build

      # `go install .` lands a release-flavored stax in $(go env GOPATH)/bin.
      # The setup-go action puts that directory on PATH.
      - name: install stax to PATH
        run: |
          go install .
          stax --version

      # The cline CLI BYOK / wire surface evolves; @latest is fragile but
      # acceptable for a manually-triggered experiment. Bump intentionally
      # after verifying the smoke test still passes against the new version.
      - name: install cline cli
        run: |
          npm install -g cline@latest
          cline --version

      # setup-uv no longer publishes moving major tags (@v8), so pin to a
      # specific version. Bump intentionally after checking release notes.
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      # conftest's pytest_collection_modifyitems sorts smoke tests first
      # so a wire-format / env / version regression fails fast instead of
      # being masked by a scenario timeout.
      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest

      # Pytest writes transcripts and per-test workspaces under tmp_path
      # (`/tmp/pytest-of-runner/...`). Uploading on failure gives us the
      # NDJSON stream that records every event the agent emitted, plus
      # the workspace state at failure.
      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
