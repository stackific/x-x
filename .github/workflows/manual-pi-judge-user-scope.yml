name: manual / pi <- llm judge (user scope)

# Identical to manual-pi-judge.yml EXCEPT for X_X_INSTALL_SCOPE.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      X_X_AGENT_KEY: pi
      X_X_INSTALL_SCOPE: user

      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install x-x to PATH
        run: |
          go install .
          x-x --version

      - name: install pi cli
        run: |
          curl -fsSL https://pi.dev/install.sh | sh
          pi --version

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest

      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
