name: skills eval / omp (oh-my-pi) (user scope)

# Identical to skills-eval-omp.yml EXCEPT for STAX_INSTALL_SCOPE.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      STAX_AGENT_KEY: omp
      STAX_INSTALL_SCOPE: user

      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: install frontend deps
        working-directory: frontend
        run: npm ci

      - name: build frontend (produces frontend/dist for the Go embed)
        working-directory: frontend
        run: npm run build

      - name: install stax to PATH
        run: |
          go install .
          stax --version

      - name: install omp
        run: |
          curl -fsSL https://omp.sh/install | sh
          echo "$HOME/.omp/bin" >> "$GITHUB_PATH"
          omp --version

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest

      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
