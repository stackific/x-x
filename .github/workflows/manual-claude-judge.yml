name: manual / claude code <- llm judge

# Manually-triggered experiment from the agent-eval lineage. The loop:
#
#   1. Install Claude Code (npm) on the runner; install x-x to PATH.
#   2. Sync the uv-managed skills-evals project (deepeval, openai, pytest,
#      python-dotenv).
#   3. Run `uv run pytest`. The tests:
#        a. Spawn `claude` in stream-json mode against DeepSeek
#           (ANTHROPIC_BASE_URL etc. routed through env).
#        b. Drive `/x-plan` and `/x-x` with an auto-yes loop
#           (skills-evals/src/skills_evals/claude_driver.py) because
#           `claude -p` is otherwise one-shot and the skills prompt for
#           confirmation mid-run.
#        c. Score the plan and the produced artifacts with two DeepEval
#           `GEval` metrics backed by DeepSeek.
#   4. Upload the pytest tmp directory (transcripts + workspace) on
#      failure so the run can be inspected offline.
#
# See docs/internal/manually-triggered-workflows.md for the conventions
# this file follows and the rationale for not using Docker `sbx` here.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    # One scenario today (TODO app) takes 5–15 min: planner + executor +
    # two judge LLM calls. 60-minute cap leaves headroom for DeepSeek
    # latency without rewarding a stuck agent.
    timeout-minutes: 60

    env:
      # Claude Code routing for DeepSeek's Anthropic-compatible endpoint.
      # Documented in docs/internal/manually-triggered-workflows.md. The
      # pytest fixture mirrors DEEPSEEK_API_KEY into ANTHROPIC_AUTH_TOKEN
      # so the judge (DeepSeek direct) and the agent (DeepSeek via
      # Anthropic-compatible wire) share one secret.
      ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      ANTHROPIC_MODEL: deepseek-v4-pro[1m]
      ANTHROPIC_DEFAULT_OPUS_MODEL: deepseek-v4-pro[1m]
      ANTHROPIC_DEFAULT_SONNET_MODEL: deepseek-v4-pro[1m]
      ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-flash
      CLAUDE_CODE_SUBAGENT_MODEL: deepseek-v4-flash
      CLAUDE_CODE_EFFORT_LEVEL: max

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # `go install .` lands a release-flavored x-x in $(go env GOPATH)/bin.
      # The setup-go action puts that directory on PATH.
      - name: install x-x to PATH
        run: |
          go install .
          x-x --version

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Claude Code's `--input-format stream-json` is reverse-engineered
      # (see github.com/anthropics/claude-code/issues/24594). The wire
      # format can change between versions, so pinning is preferable to
      # @latest. Bump intentionally after verifying the smoke test still
      # passes against the new version.
      - name: install claude code
        run: |
          npm install -g @anthropic-ai/claude-code@latest
          claude --version

      # setup-uv no longer publishes moving major tags (@v8), so pin to a
      # specific version. Bump intentionally after checking release notes.
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      # `test_stream_json_smoke.py` runs first (alphabetical pytest order)
      # — a wire-format / env / version failure fails it without burning
      # a full planner+executor cycle on the real scenario.
      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest

      # Pytest writes transcripts and per-test workspaces under tmp_path
      # (`/tmp/pytest-of-runner/...`). Uploading on failure gives us the
      # JSONL stream that records every event the agent emitted, plus the
      # workspace state at failure.
      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
