name: skills eval / pi

# Manually-triggered experiment from the agent-eval lineage. The loop:
#
#   1. Install Pi (`@earendil-works/pi-coding-agent` from pi.dev) on the
#      runner; install stax to PATH.
#   2. Sync the uv-managed skills-evals project (deepeval, openai, pytest,
#      python-dotenv).
#   3. Run `uv run pytest`. The tests:
#        a. Spawn `pi --mode json --model deepseek/<id> -p "/skill:<name>
#           <task>"` per turn (single-shot subprocesses; resume with -c).
#           Pi's CLI command parser resolves `/skill:<name>` against
#           SKILL.md frontmatter `name:` values — `stax init --agents pi`
#           writes the SKILL.md tree exactly where pi discovers it.
#        b. Drive the scope / stax skill prompts via that slash-command
#           form in skills_evals.pi_driver. Confirmation gates show up as
#           text events the driver matches against the "Reply yes" pattern
#           and replies to with `pi -c -p yes` on the next turn.
#        c. Score the work item and the produced artifacts with two DeepEval
#           `GEval` metrics backed by DeepSeek.
#   4. Upload the pytest tmp directory (transcripts + workspace) on
#      failure so the run can be inspected offline.
#
# See docs/internal/manually-triggered-workflows.md for the conventions
# this file follows.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    # 60-minute cap leaves headroom for DeepSeek latency across the
    # smoke + scenario tests without rewarding a stuck agent.
    timeout-minutes: 60

    env:
      # STAX_AGENT_KEY tells the skills-evals conftest which backend's
      # tests to collect, which binary to require on PATH, and which
      # `--agents <key>` value to pass to `stax init`.
      STAX_AGENT_KEY: pi

      # Pi reads `DEEPSEEK_API_KEY` directly for the `deepseek` provider
      # entry in its model registry — no rename mirror needed. The judge
      # LLM uses the same key directly.
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      # Pi reaches `pi.dev/api/latest-version` and `pi.dev/api/report-install`
      # on startup. Disable both so a transient pi.dev outage can't bleed
      # into the eval's wall-clock or leak a CI install ping.
      PI_OFFLINE: "1"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # server.go embeds frontend/dist via //go:embed all:frontend/dist
      # (gitignored). Build it before `go install` or the embed pattern
      # resolves to an empty dir and the compile fails at server.go.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: install frontend deps
        working-directory: frontend
        run: npm ci

      - name: build frontend (produces frontend/dist for the Go embed)
        working-directory: frontend
        run: npm run build

      # `go install .` lands a release-flavored stax in $(go env GOPATH)/bin.
      # The setup-go action puts that directory on PATH.
      - name: install stax to PATH
        run: |
          go install .
          stax --version

      # The shell installer (curl pi.dev/install.sh) is itself an npm
      # wrapper that requires Node already present; cutting straight to
      # npm gives deterministic PATH placement under setup-node's global
      # bin dir. @latest is fragile but acceptable until we have a
      # known-good version; bump intentionally if the smoke test starts
      # failing on a fresh release. `--ignore-scripts` matches the
      # README's recommended form (pi does not require install scripts
      # for normal npm installs).
      - name: install pi cli
        run: |
          npm install -g --ignore-scripts @earendil-works/pi-coding-agent@latest
          pi --version

      # setup-uv no longer publishes moving major tags (@v8), so pin to
      # a specific version. Bump intentionally after checking release notes.
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      # conftest's pytest_collection_modifyitems sorts smoke tests first
      # so a wire-format / env / version regression fails fast instead of
      # being masked by a scenario timeout.
      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest

      # Pytest writes transcripts and per-test workspaces under tmp_path
      # (`/tmp/pytest-of-runner/...`). Uploading on failure gives us the
      # JSONL stream that records every event the agent emitted, plus
      # the workspace state at failure.
      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
