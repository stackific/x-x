name: manual / openai codex <- llm judge

# Manually-triggered experiment in the agent-eval lineage. Targets the
# OpenAI Codex CLI (`codex`, from @openai/codex on npm). Drivers,
# judges, and test files live in a follow-up PR — this workflow ships
# the scaffold (CLI install, env routing, pytest invocation) so the
# eval suite can plug in once the codex driver lands.
#
# Non-interactive entry: `codex exec "<prompt>"` (alias `codex e`) runs
# headlessly and exits when the agent considers the task complete.
# Background: feat/codex-eval-backend previously hit a translator-side
# tool-call wall when routing codex CLI through LiteLLM at DeepSeek;
# the new driver will need a different routing approach.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      X_X_AGENT_KEY: codex

      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install x-x to PATH
        run: |
          go install .
          x-x --version

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: install openai codex cli
        run: |
          npm install -g @openai/codex@latest
          codex --version

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest

      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
