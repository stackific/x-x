name: manual / codex cli <- llm judge (user scope)

# Manually-triggered experiment from the agent-eval lineage. User-scope
# variant of manual-codex-judge.yml — same agent (Codex CLI), same
# routing (OpenRouter BYOK to DeepSeek), same scenarios, but
# X_X_INSTALL_SCOPE=user so `x-x init` installs skills into the user
# tree (~/.codex/ + cross-agent skill discovery) instead of the per-
# workspace tree. Exercises the user-scope branch of `x-x init` against
# the Codex backend.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      # Identical to manual-codex-judge.yml EXCEPT for X_X_INSTALL_SCOPE.
      # The pytest fixture (skills-evals/tests/conftest.py) reads
      # X_X_INSTALL_SCOPE and passes it to `x-x init --scope <value>`.
      X_X_INSTALL_SCOPE: user

      X_X_AGENT: codex

      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install x-x to PATH
        run: |
          go install .
          x-x --version

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: install codex cli
        run: |
          npm install -g @openai/codex@latest
          codex --version

      - name: configure codex for openrouter
        run: |
          mkdir -p ~/.codex
          cat > ~/.codex/config.toml <<'EOF'
          [model_providers.openrouter]
          name = "OpenRouter"
          base_url = "https://openrouter.ai/api/v1"
          env_key = "OPENROUTER_API_KEY"

          [profiles.eval]
          model = "deepseek/deepseek-chat"
          model_provider = "openrouter"
          EOF
          echo "--- ~/.codex/config.toml ---"
          cat ~/.codex/config.toml

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      - name: run pytest (codex suite, user scope)
        working-directory: skills-evals
        run: |
          uv run pytest \
            tests/test_codex_smoke.py \
            tests/test_codex_todo.py \
            tests/test_codex_plan_extends.py \
            tests/test_codex_reminders_supersedes_todo.py

      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
