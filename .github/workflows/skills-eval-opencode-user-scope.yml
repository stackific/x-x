name: skills eval / opencode (user scope)

# Identical to skills-eval-opencode.yml EXCEPT for STAX_INSTALL_SCOPE.
# This workflow installs skills at user scope (~/.opencode/commands/)
# rather than project scope (<workspace>/.opencode/commands/) so we
# exercise that branch of `stax init`. The pytest fixture
# (skills-evals/tests/conftest.py) reads STAX_INSTALL_SCOPE and passes
# it to `stax init --scope <value>`, and the opencode driver's
# `resolve_skill_template` helper falls back from project to user scope
# when locating the SKILL.md to inline.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      STAX_AGENT_KEY: opencode
      STAX_INSTALL_SCOPE: user

      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # server.go embeds frontend/dist via //go:embed all:frontend/dist
      # (gitignored). Build it before `go install` or the embed pattern
      # resolves to an empty dir and the compile fails at server.go.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: install frontend deps
        working-directory: frontend
        run: npm ci

      - name: build frontend (produces frontend/dist for the Go embed)
        working-directory: frontend
        run: npm run build

      - name: install stax to PATH
        run: |
          go install .
          stax --version

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: install opencode
        run: |
          npm install -g opencode-ai@latest
          opencode --version

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest

      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
