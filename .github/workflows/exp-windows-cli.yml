name: exp / windows cli smoke

# Manually-triggered Windows smoke test, two-job pipeline:
#
#   build  (ubuntu-latest, golang container) -> `task build` -> upload bin/
#   smoke  (windows-latest)                  -> download bin/ ->
#                                               INSTALL_LOCAL.ps1 -> e2e_test.ps1
#                                               -> UNINSTALL.ps1 -> assert clean
#
# Why the split: building inside a Linux container is non-negotiable -
# `task build` cross-compiles every supported platform into ./bin in one
# pass, matching the release pipeline, so the Windows binary the smoke
# tests run against is bit-equivalent with what real users would download.
# The Windows runner only consumes the artifact; it doesn't build.
#
# Standalone - never merges with the agent-eval lineage (see
# docs/internal/manually-triggered-workflows.md).

on:
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Print extra diagnostics (PowerShell -Verbose)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    # Build the cross-platform bin/ tree inside a real Linux container so
    # the artifact matches what a release would produce. Uses the same
    # golang image .github/workflows/test.yml does, plus an inline `task`
    # install (the Taskfile orchestrates the multi-platform build).
    runs-on: ubuntu-latest
    container:
      image: golang:1.26-bookworm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Recent Git refuses to operate on a repo with mismatched ownership
      # ("fatal: detected dubious ownership"). The checkout writes as the
      # runner user but the container runs as root. Mirror the trust step
      # from test.yml so downstream git/go calls don't fail with exit 128.
      - name: Trust workspace inside container
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # `task` isn't in the golang image. Install via the official installer
      # to $GOPATH/bin which the container's PATH already includes.
      - name: install task
        run: |
          sh -c "$(curl -fsSL https://taskfile.dev/install.sh)" -- -d -b "$(go env GOPATH)/bin"
          task --version

      # `task build` cross-compiles for linux/{amd64,arm64}, darwin/{amd64,
      # arm64}, windows/{amd64,arm64} into ./bin. The Windows smoke job
      # only needs windows-amd64, but uploading the full set keeps the
      # artifact useful for inspection / debugging.
      - name: task build
        run: task build

      - name: upload bin
        uses: actions/upload-artifact@v4
        with:
          name: bin
          path: bin/
          if-no-files-found: error
          retention-days: 7

  smoke:
    runs-on: windows-latest
    needs: build
    timeout-minutes: 30

    # All steps run in pwsh (PowerShell 7) - the default on windows-latest,
    # pinned explicitly so a future image change can't surprise us.
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      # Pull the artifact built by the Linux container job. INSTALL_LOCAL.ps1
      # reads bin\x-x-windows-amd64.exe (computed from
      # $env:PROCESSOR_ARCHITECTURE - windows-latest is x64, so this picks
      # the amd64 variant).
      - name: download bin
        uses: actions/download-artifact@v4
        with:
          name: bin
          path: bin

      - name: list bin contents
        run: |
          Get-ChildItem -LiteralPath bin | Format-Table Name, Length, LastWriteTime

      # INSTALL_LOCAL.ps1 picks the right binary from bin/ based on the
      # host architecture, copies it to $HOME\.x-x\x-x.exe, patches the
      # user PATH, and seeds ~/.x-x/.config.json + materialized agents
      # tree. This is the install flow we want to verify end-to-end.
      - name: install via INSTALL_LOCAL.ps1
        run: |
          .\scripts\INSTALL_LOCAL.ps1
          if ($LASTEXITCODE -ne 0) { throw "INSTALL_LOCAL.ps1 failed with exit $LASTEXITCODE" }

      - name: verify installed binary
        run: |
          $bin = Join-Path $HOME '.x-x\x-x.exe'
          if (-not (Test-Path -LiteralPath $bin)) { throw "binary not at $bin" }
          & $bin --version
          if ($LASTEXITCODE -ne 0) { throw "$bin --version exited $LASTEXITCODE" }

      # e2e_test.ps1 consumes the installed binary at $HOME\.x-x\x-x.exe
      # and runs ~180 cases covering bare invocation, init matrix, skills
      # remove, plans next-prefix/list/lint/slugify, and Windows-specific
      # behaviors (copy-not-symlink, %USERPROFILE% scope, CRLF, reserved
      # filenames, case-insensitive filesystem, etc.). Case #1 is a
      # meta-smoke that aborts the whole suite if the harness itself is
      # broken, so a regression in Invoke-XX never cascades into hundreds
      # of misleading failures.
      - name: run e2e suite
        run: |
          $verboseFlag = if ('${{ inputs.verbose }}' -eq 'true') { '-Verbose' } else { '' }
          & pwsh -NoLogo -NonInteractive -File .\scripts\e2e_test.ps1 $verboseFlag
          if ($LASTEXITCODE -ne 0) { throw "e2e_test.ps1 failed with exit $LASTEXITCODE" }

      - name: uninstall via UNINSTALL.ps1
        if: always()
        run: |
          .\scripts\UNINSTALL.ps1
          if ($LASTEXITCODE -ne 0) { throw "UNINSTALL.ps1 failed with exit $LASTEXITCODE" }

      - name: verify install dir is removed
        if: always()
        run: |
          $xxDir = Join-Path $HOME '.x-x'
          if (Test-Path -LiteralPath $xxDir) {
            $leftovers = Get-ChildItem -Recurse -Force -LiteralPath $xxDir |
                         Select-Object -ExpandProperty FullName
            throw "expected $xxDir to be removed; leftovers:`n$($leftovers -join "`n")"
          }
          $bin = Join-Path $HOME '.x-x\x-x.exe'
          if (Test-Path -LiteralPath $bin) { throw "binary still present: $bin" }
