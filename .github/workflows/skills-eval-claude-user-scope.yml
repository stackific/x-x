name: skills eval / claude code (user scope)

# Identical to skills-eval-claude.yml EXCEPT for STAX_INSTALL_SCOPE.
# Installs skills at user scope (~/.claude/skills/) rather than project
# scope (<workspace>/.claude/skills/) so we exercise that branch of
# `stax init`. The pytest fixture (skills-evals/tests/conftest.py) reads
# STAX_INSTALL_SCOPE and passes it to `stax init --scope <value>`.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      STAX_INSTALL_SCOPE: user

      ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      ANTHROPIC_MODEL: deepseek-v4-pro[1m]
      ANTHROPIC_DEFAULT_OPUS_MODEL: deepseek-v4-pro[1m]
      ANTHROPIC_DEFAULT_SONNET_MODEL: deepseek-v4-pro[1m]
      ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-flash
      CLAUDE_CODE_SUBAGENT_MODEL: deepseek-v4-flash
      CLAUDE_CODE_EFFORT_LEVEL: max

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: install frontend deps
        working-directory: frontend
        run: npm ci

      - name: build frontend (produces frontend/dist for the Go embed)
        working-directory: frontend
        run: npm run build

      - name: install stax to PATH
        run: |
          go install .
          stax --version

      - name: install claude code
        run: |
          npm install -g @anthropic-ai/claude-code@latest
          claude --version

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest

      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
