name: skills eval / omp (oh-my-pi)

# Manually-triggered experiment in the agent-eval lineage. Targets
# oh-my-pi (`omp`, from omp.sh — a Rust-cored terminal coding agent
# with 40+ providers and LSP/debugger integration).
#
# Non-interactive entry: `omp -p "<prompt>"` runs a single prompt to
# completion. Provider routing is configured via `omp config set ...`
# or through env; the driver wires DeepSeek-specific config at
# spawn time.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    # 60-minute cap leaves headroom for DeepSeek latency across the
    # smoke + scenario tests without rewarding a stuck agent.
    timeout-minutes: 60

    env:
      # STAX_AGENT_KEY tells the skills-evals conftest which backend's
      # tests to collect, which binary to require on PATH, and which
      # `--agents <key>` value to pass to `stax init`.
      STAX_AGENT_KEY: omp

      # omp's deepseek provider catalog routes DEEPSEEK_API_KEY directly
      # to api.deepseek.com — no rename mirror needed. The judge LLM uses
      # the same key directly.
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # server.go embeds frontend/dist via //go:embed all:frontend/dist
      # (gitignored). Build it before `go install` or the embed pattern
      # resolves to an empty dir and the compile fails at server.go.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: install frontend deps
        working-directory: frontend
        run: npm ci

      - name: build frontend (produces frontend/dist for the Go embed)
        working-directory: frontend
        run: npm run build

      # `go install .` lands a release-flavored stax in $(go env GOPATH)/bin.
      # The setup-go action puts that directory on PATH.
      - name: install stax to PATH
        run: |
          go install .
          stax --version

      # omp ships an autodetecting installer (Bun-based source path or
      # standalone binary) at omp.sh/install; binary lives at ~/.omp/bin
      # by default. No version pin available upstream.
      - name: install omp
        run: |
          curl -fsSL https://omp.sh/install | sh
          echo "$HOME/.omp/bin" >> "$GITHUB_PATH"
          omp --version

      # setup-uv no longer publishes moving major tags (@v8), so pin to
      # a specific version. Bump intentionally after checking release notes.
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      # conftest's pytest_collection_modifyitems sorts smoke tests first
      # so a wire-format / env / version regression fails fast instead of
      # being masked by a scenario timeout.
      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest

      # Pytest writes transcripts and per-test workspaces under tmp_path
      # (`/tmp/pytest-of-runner/...`). Uploading on failure gives us the
      # event stream the agent emitted plus the workspace state at failure.
      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
