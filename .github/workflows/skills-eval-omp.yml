name: skills eval / omp (oh-my-pi)

# Manually-triggered experiment in the agent-eval lineage. Targets
# oh-my-pi (`omp`, from omp.sh — a Rust-cored terminal coding agent
# with 40+ providers and LSP/debugger integration). Drivers, judges,
# and test files live in a follow-up PR — this workflow ships the
# scaffold (CLI install, env routing, pytest invocation) so the eval
# suite can plug in once the omp driver lands.
#
# Non-interactive entry: `omp -p "<prompt>"` runs a single prompt to
# completion. Provider routing is configured via `omp config set ...`
# or through env; the driver will wire DeepSeek-specific config at
# spawn time.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      STAX_AGENT_KEY: omp

      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install stax to PATH
        run: |
          go install .
          stax --version

      # omp ships an autodetecting installer (Bun-based source path or
      # standalone binary) at omp.sh/install; binary lives at ~/.omp/bin
      # by default.
      - name: install omp
        run: |
          curl -fsSL https://omp.sh/install | sh
          echo "$HOME/.omp/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.omp/bin:$PATH"
          omp --version

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: install skills-evals deps
        working-directory: skills-evals
        run: uv sync --frozen || uv sync

      - name: run pytest
        working-directory: skills-evals
        run: uv run pytest

      - name: upload pytest tmp on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-tmp-${{ github.run_id }}
          path: /tmp/pytest-of-runner/
          if-no-files-found: warn
          retention-days: 14
